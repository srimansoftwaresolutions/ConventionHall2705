<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Convention Hall Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        h1 {
            color: #f59e0b;
            font-size: 1.5rem;
        }

        .logout-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: #dc2626;
        }

        main {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        .welcome-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .stat-title {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f8fafc;
        }
    </style>
</head>
<body>

    <header>
        <h1>Convention Hall Booking System</h1>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </header>

    <main>
        <div class="welcome-card">
            <h2>Welcome Back!</h2>
            <p style="color: #94a3b8; margin-top: 0.5rem;">You have successfully authenticated via Google Corporate Account.</p>
        </div>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-title">Active Bookings</div>
                <div class="stat-value">12</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Pending Approvals</div>
                <div class="stat-value">3</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Hall Capacity Availability</div>
                <div class="stat-value">85%</div>
            </div>
        </div>
    </main>

    <script>
        // ROUTING GUARD: If user is not authenticated, bounce them back to login page instantly
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Logout action to clear session tokens and redirect
        function logout() {
            localStorage.removeItem('isLoggedIn');
            // If you saved a backend JWT token, clear it here too:
            // localStorage.removeItem('userToken'); 
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
