<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Convention Hall Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-[#0b132b] text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-xl font-bold tracking-wide text-center sm:text-left">
                Sriman Software Solutions
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-[#1c2541] px-4 py-2 rounded-full border border-gray-700">
                    <span class="bg-amber-500 text-[#0b132b] w-8 h-8 rounded-full flex items-center justify-center font-bold">S</span>
                    <span class="text-sm font-medium text-gray-300 hidden md:inline">srimansoftwaresolutions@gmail.com</span>
                </div>
                <button class="border border-gray-400 hover:bg-white hover:text-[#0b132b] transition-colors duration-200 text-xs px-4 py-2 rounded-full font-semibold">
                    Sign Out
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-12">
        <div class="bg-[#1c2541] rounded-lg shadow-xl p-8 mb-12 text-center border-b-4 border-amber-500">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">
                Convention Hall Booking System
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <a href="overview.html" class="block bg-white p-8 rounded-xl shadow-md border border-gray-200 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 group text-center">
                <div class="text-4xl text-[#1c2541] mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
                <h2 class="text-xl font-bold text-[#0b132b] mb-2">Overview</h2>
                <p class="text-gray-500 text-sm">3 Months Calendar view</p>
            </a>

            <a href="date-check.html" class="block bg-white p-8 rounded-xl shadow-md border border-gray-200 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 group text-center">
                <div class="text-4xl text-[#1c2541] mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <h2 class="text-xl font-bold text-[#0b132b] mb-2">Date</h2>
                <p class="text-gray-500 text-sm">Check availability for a specific date</p>
            </a>

            <a href="booking-form.html" class="block bg-white p-8 rounded-xl shadow-md border border-gray-200 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 group text-center">
                <div class="text-4xl text-[#1c2541] mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
                <h2 class="text-xl font-bold text-[#0b132b] mb-2">Booking Form</h2>
                <p class="text-gray-500 text-sm">Create a New Booking here</p>
            </a>

        </div>
    </main>

    <footer class="bg-gray-200 text-center py-4 text-xs text-gray-600 border-t border-gray-300">
        &copy; 2026 Sriman Software Solutions. All rights reserved.
    </footer>

</body>
</html>
