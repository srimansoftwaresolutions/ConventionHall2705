<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Booking System</title>
    <script src="https://accounts.google.com/g_si/client" async defer></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #1e293b;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        h2 {
            margin-bottom: 0.5rem;
            color: #f59e0b;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Convention Hall Login</h2>
        <p>Sign in using your corporate account to access the dashboard</p>
        
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="872840152167-kfqbk32onvm6jrka8g39c2lq1v26ra4p.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="skewed"
                 data-theme="filled_blue"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <script>
        // Callback function triggered immediately after successful Google login
        function handleCredentialResponse(response) {
            // Decode the Google JWT token payload to extract user info
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const googleUser = JSON.parse(jsonPayload);
            
            // Extract the user identity (you can use googleUser.name or googleUser.email)
            const userIdentity = googleUser.email || googleUser.name;

            // Save the identity payload to localStorage
            localStorage.setItem('loggedInUser', userIdentity);

            // Redirect smoothly to your dashboard
            window.location.href = "Dashboard.html";
        }
    </script>
</body>
</html>
