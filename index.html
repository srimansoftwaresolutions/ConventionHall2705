<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Booking System</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .login-card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #334155;
        }

        .card-title {
            color: #f59e0b;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Container to center and space the Google button */
        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="card-title">Convention Hall Login</h2>
        <p class="card-subtitle">Sign in using your corporate account to access the dashboard</p>
        
        <div class="google-btn-container">
            <div id="g_id_onload"
                 data-client_id="872840152167-kfqbk32onvm6jrka8g39c2lq1v26ra4p.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rounded"
                 data-theme="filled_blue"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
        </div>

    <script>
        // Callback function triggered after a user successfully logs in with Google
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            
            // Step 1: Send 'response.credential' to your backend server via fetch/axios
            // Step 2: Verify the token on your backend and grant dashboard access
            
            alert("Google login successful! Sending token to backend verification...");
        }
    </script>
</body>
</html>
