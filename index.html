<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Booking System</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .login-card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #334155;
        }

        .card-title {
            color: #f59e0b;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .loading-text {
            display: none;
            color: #94a3b8;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="card-title">Convention Hall Login</h2>
        <p class="card-subtitle">Sign in using your corporate account to access the dashboard</p>
        
        <div class="google-btn-container">
            <div id="g_id_onload"
                 data-client_id="872840152167-kfqbk32onvm6jrka8g39c2lq1v26ra4p.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rounded"
                 data-theme="filled_blue"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div id="loadingStatus" class="loading-text">Verifying corporate credentials...</div>
    </div>

    <script>
        async function handleCredentialResponse(response) {
            // Show loading status and hide button area
            document.getElementById('loadingStatus').style.display = 'block';
            console.log("Google token received. Processing authentication...");

            try {
                /* ===================================================================
                OPTIONAL: IF YOU HAVE A LIVE BACKEND API, UNCOMMENT THIS BLOCK
                ===================================================================
                const backendResponse = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await backendResponse.json();
                if (!backendResponse.ok) throw new Error(data.message || "Auth Failed");
                localStorage.setItem('userToken', data.token);
                ===================================================================
                */

                // Simulated backend delay for visual transition smoothness
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Save a temporary authenticated flag for frontend routing
                localStorage.setItem('isLoggedIn', 'true');

                // Clear login errors and seamlessly transition to dashboard
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error("Authentication failed:", error);
                alert("Login failed: " + error.message);
                document.getElementById('loadingStatus').style.display = 'none';
            }
        }

        // Security check: If already logged in, skip login page entirely
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
