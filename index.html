<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Booking System</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 2.5rem;
            border: 1px solid #334155;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #f59e0b;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .status-message {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Convention Hall Login</h2>
        <p>Sign in using your corporate account to access the dashboard</p>
        
        <div class="google-btn-container">
            <div id="g_id_onload"
                 data-client_id="872840152167-kfqbk32onvm6jrka8g39c2lq1v26ra4p.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="sign_in_with"
                 data-shape="semibold"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="status-message" id="status">Awaiting authentication...</div>
    </div>

    <script>
        // Callback function executed automatically after successful Google Sign-In
        function handleCredentialResponse(response) {
            try {
                document.getElementById('status').textContent = "Verifying corporate credentials...";
                
                // 1. Decode Google's JWT token payload
                const responsePayload = parseJwt(response.credential);
                
                // 2. Extract the email (or fallback to name if email is hidden)
                const userEmail = responsePayload.email || responsePayload.name || 'Corporate User';
                
                // 3. Save session values correctly to localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userId', userEmail); 
                
                document.getElementById('status').textContent = "Redirecting to dashboard...";
                
                // 4. Redirect to the dashboard page safely
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error("Login Error:", error);
                document.getElementById('status').textContent = "Login failed: Error processing account token.";
                document.getElementById('status').style.color = "#ef4444";
            }
        }

        // Helper function to decode standard JWT (JSON Web Tokens) provided by Google
        function parseJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                return JSON.parse(jsonPayload);
            } catch(e) {
                throw new Error("Invalid Token Structure");
            }
        }

        // AUTO-FORWARD: If they are already logged in, skip this page entirely
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
