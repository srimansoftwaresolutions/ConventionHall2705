<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Booking System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #f59e0b;
        }
        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 4px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #d97706;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Convention Hall Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">User ID / Username</label>
                <input type="text" id="username" required placeholder="Enter your User ID">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In</button>
            <div id="errorMessage" class="error-message">Invalid User ID or Password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            // Simple demo validation (Replace with your actual credential logic or API call)
            if (usernameInput !== "" && passwordInput === "admin123") {
                
                // CRUCIAL: Save the User ID to localStorage
                localStorage.setItem('loggedInUser', usernameInput);
                
                // Redirect to the Dashboard page
                window.location.href = "Dashboard.html";
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
