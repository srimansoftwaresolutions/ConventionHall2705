<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Availability - Convention Hall</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --primary: #0284c7;
            --accent: #f59e0b;
            --success-bg: #f0fdf4;
            --success-text: #16a34a;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* Navbar Header */
        .navbar {
            background-color: var(--bg-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .nav-buttons .btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-buttons .btn:hover {
            background-color: white;
            color: var(--bg-color);
        }

        /* Main Layout */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Search Box Card */
        .search-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .search-card label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
        }

        .search-card input[type="date"] {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-card input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        /* Status / Instruction Text */
        .status-message {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--bg-color);
            margin: 2rem 0;
        }

        /* Results Card Container (Hidden by Default) */
        .availability-card {
            display: none; /* Keeps it hidden until JS changes it to 'block' */
            background: var(--card-bg);
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .availability-card h2 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: #334155;
            font-size: 1.35rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
        }

        .hall-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            padding: 1rem;
            border-radius: 6px;
        }

        .hall-type {
            color: var(--text-muted);
        }

        .hall-type strong {
            color: var(--text-dark);
        }

        .status-badge {
            background-color: var(--success-bg);
            color: var(--success-text);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <h1>Convention Hall Booking System</h1>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="date-check.html" class="btn">Reset</a>
        </div>
    </header>

    <main class="container">
        
        <div class="search-card">
            <label for="booking-date">Select Date from Calendar:</label>
            <input type="date" id="booking-date">
        </div>

        <div id="status-instruction" class="status-message">
            Please select a date to view availability schedule.
        </div>

        <div id="availability-card" class="availability-card">
            <h2>HY ONE (Vattinagulapally)</h2>
            <div class="hall-info-row">
                <span class="hall-type">Hall Type: <strong>HY 1 FULL (2000 Pac)</strong></span>
                <span class="status-badge">Available</span>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('booking-date').addEventListener('change', function() {
            const availabilityCard = document.getElementById('availability-card');
            const statusInstruction = document.getElementById('status-instruction');
            
            if (this.value) {
                // A date has been picked: Hide instruction text and show the venue status
                statusInstruction.style.display = 'none';
                availabilityCard.style.display = 'block';
            } else {
                // Field was cleared: Bring back instructions and hide venue status
                statusInstruction.style.display = 'block';
                availabilityCard.style.display = 'none';
            }
        });
    </script>

</body>
</html>
